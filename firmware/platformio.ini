; PlatformIO config cho ESP32 + MPU6050 + TFLite Micro
; Build: pio run -e esp32dev
; Upload: pio run -e esp32dev -t upload
; Monitor: pio device monitor -b 115200

[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

build_flags =
    -D CORE_DEBUG_LEVEL=3
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    -std=gnu++11

lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
    electroniccats/MPU6050@^1.4.0
    adafruit/Adafruit SSD1306@^2.5.7
    adafruit/Adafruit GFX Library@^1.11.9
    ; TFLite Micro cho Arduino - khi co model.h thi them lib nay:
    ; tensorflow/TensorFlowLite_ESP32@^0.9.0

; default.csv chia ~1.5MB cho SPIFFS/LittleFS, du cho ~6h log activity/pose/step.
; Doi sang min_spiffs.csv neu can app firmware lon hon (vd them TFLM model).
board_build.partitions = default.csv
board_build.filesystem = littlefs
