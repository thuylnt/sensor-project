# Mosquitto config cho demo môn học - KHÔNG dùng cấu hình này ngoài Internet.
persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout

# Listener MQTT chuẩn
listener 1883
allow_anonymous true

# Listener WebSocket (cho Node-RED dashboard nếu cần subscribe trực tiếp)
listener 9001
protocol websockets
allow_anonymous true
