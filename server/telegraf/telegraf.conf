# Telegraf consume MQTT topics usth/pdr/<device_id>/* va ghi vao InfluxDB 2.x

[agent]
  interval = "1s"
  round_interval = true
  metric_batch_size = 500
  metric_buffer_limit = 5000
  flush_interval = "2s"
  omit_hostname = true

# === OUTPUT: InfluxDB v2 ===
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "usth-sensor-admin-token-change-me"
  organization = "usth"
  bucket = "pdr"

# === INPUT: MQTT activity ===
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = ["usth/pdr/+/activity"]
  data_format = "json"
  json_time_key = "ts"
  json_time_format = "unix_ms"
  topic_tag = "topic"
  name_override = "activity"
  json_string_fields = ["class"]
  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "usth/pdr/+/activity"
    tags = "_/_/device_id/_"

